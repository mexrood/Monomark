<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Monomark</title>
    <style>
      html, body { margin: 0; padding: 0; background: #131313; overflow: hidden; }

      /* ── Splash preloader ──────────────────────────────────────── */
      #splash {
        position: fixed; inset: 0; z-index: 99999;
        display: flex; align-items: center; justify-content: center;
        background: #131313;
        transition: opacity 0.4s ease, visibility 0.4s ease;
      }
      #splash.hidden {
        opacity: 0; visibility: hidden; pointer-events: none;
      }
      #splash-logo {
        width: 42px; height: 38px;
        position: relative;
      }
      /* Base logo — dark gray outline */
      #splash-logo svg {
        position: absolute; inset: 0;
        width: 100%; height: 100%;
      }
      #splash-logo svg path { fill: #2a2a2a; }
      /* Filled logo — white, clipped by the rising mask */
      #splash-logo .splash-fill svg path { fill: #ffffff; }
      #splash-logo .splash-fill {
        position: absolute; inset: 0;
        clip-path: inset(100% 0 0 0);
        animation: splash-rise 1.8s ease-in-out infinite;
      }
      @keyframes splash-rise {
        0%   { clip-path: inset(100% 0 0 0); }
        50%  { clip-path: inset(0 0 0 0); }
        100% { clip-path: inset(0 0 100% 0); }
      }
    </style>
  </head>
  <body>
    <!-- Splash — visible instantly, hidden after React mounts -->
    <div id="splash">
      <div id="splash-logo">
        <svg width="84" height="77" viewBox="0 0 84 77" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M38.7719 32.0944C40.5547 33.8645 43.4453 33.8645 45.2281 32.0944L76.2067 1.33667C79.0826 -1.51875 84 0.503583 84 4.54176V72.4673C84 74.9707 81.9561 77 79.4348 77H4.56522C2.04392 77 0 74.9707 0 72.4673V4.54176C0 0.503581 4.91739 -1.51874 7.79331 1.33668L38.7719 32.0944Z" fill="white"/>
        </svg>
        <div class="splash-fill">
          <svg width="84" height="77" viewBox="0 0 84 77" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M38.7719 32.0944C40.5547 33.8645 43.4453 33.8645 45.2281 32.0944L76.2067 1.33667C79.0826 -1.51875 84 0.503583 84 4.54176V72.4673C84 74.9707 81.9561 77 79.4348 77H4.56522C2.04392 77 0 74.9707 0 72.4673V4.54176C0 0.503581 4.91739 -1.51874 7.79331 1.33668L38.7719 32.0944Z" fill="white"/>
          </svg>
        </div>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
