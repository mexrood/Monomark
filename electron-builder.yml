appId: dev.monomark.app
productName: Monomark
copyright: "Copyright © 2025 Monomark"

# Directories
directories:
  output: release
  buildResources: build

asar: true
# Native addons (.node) and the sql.js .wasm must sit OUTSIDE the asar archive
# so the OS loader / runtime can reach them.
asarUnpack:
  - "**/*.node"
  - "node_modules/node-llama-cpp/**"
  - "node_modules/@node-llama-cpp/**"
  - "node_modules/onnxruntime-node/**"
  - "node_modules/sharp/**"
  - "node_modules/@img/**"
  - "node_modules/@xenova/**"
  - "node_modules/sql.js/**"
compression: normal
npmRebuild: false
afterPack: scripts/afterPack.js
extraMetadata:
  # vite bundles every renderer/main dependency, so the packaged app only needs
  # the native / external modules shipped as real node_modules. Listing just
  # these three makes electron-builder include them + their transitive deps.
  dependencies:
    node-llama-cpp: "^3.18.1"
    "@xenova/transformers": "^2.17.2"
    sql.js: "^1.13.0"

# Files to include in the app package
files:
  - "dist/**/*"
  - "dist-electron/**/*"
  - "package.json"
  - "!**/*.{md,markdown}"
  - "!**/*.{ts,tsx,map}"
  - "!**/*.test.{js,ts}"
  - "!**/test/**"
  - "!**/tests/**"
  - "!**/__tests__/**"
  - "!**/*.d.ts"
  - "!**/.git*"
  - "!**/.editorconfig"
  - "!**/.eslintrc*"
  - "!**/tsconfig*.json"
  - "!**/.prettierrc*"
  - "!**/CHANGELOG*"
  - "!**/{README,readme}*"
  - "!**/example*/**"
  - "!**/examples/**"
  - "!**/docs/**"
  - "!**/doc/**"
  - "!**/.github/**"
  - "!**/.claude/**"

# ── Windows ──────────────────────────────────────────────────────────────────
win:
  icon: build/icon.ico
  target:
    - target: nsis
      arch: [x64]
    - target: zip
      arch: [x64]
  # Register .md file association
  fileAssociations:
    - ext: md
      name: Markdown Document
      description: Markdown file
      icon: build/icon.ico
      role: Editor

nsis:
  # oneClick: true — silent install/update flow (no wizard for first install,
  # no wizard for auto-updates). User clicks "Restart now" in the in-app
  # update dialog → app closes → installer runs silently → new version starts.
  # This is the standard pattern for Electron apps with auto-update (Discord,
  # Slack, VS Code Insiders, etc.). Path selection is intentionally omitted —
  # always installs to %LocalAppData%\Programs\Monomark.
  oneClick: true
  perMachine: false
  allowElevation: false
  deleteAppDataOnUninstall: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Monomark
  artifactName: "${productName}-Setup-${version}-${arch}.exe"
  include: scripts/installer.nsh

# ── macOS ─────────────────────────────────────────────────────────────────────
mac:
  icon: build/icon.icns
  category: public.app-category.productivity
  darkModeSupport: true
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]
  fileAssociations:
    - ext: md
      name: Markdown Document
      role: Editor
      icon: build/icon.icns
  entitlementsInherit: build/entitlements.mac.plist
  hardenedRuntime: true
  gatekeeperAssess: false

dmg:
  title: "Monomark ${version}"
  background: build/dmg-background.png
  window:
    width: 540
    height: 380
  contents:
    - x: 150
      y: 185
      type: file
    - x: 390
      y: 185
      type: link
      path: /Applications

# ── Linux ─────────────────────────────────────────────────────────────────────
linux:
  icon: build/icon.png
  category: Office
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  fileAssociations:
    - ext: md
      name: Markdown Document
      mimeType: text/markdown

# ── Extra resources (available at runtime via process.resourcesPath) ──────────
extraResources:
  - from: build/icon.ico
    to: tray.ico
  - from: build/icons/32x32.png
    to: tray.png

# ── Auto-update ───────────────────────────────────────────────────────────────
publish:
  - provider: github
    owner: mexrood
    repo: Monomark
    releaseType: release
    # private: true tells electron-updater to use the GitHub REST API with the
    # GH_TOKEN env var (instead of the public releases.atom RSS feed which
    # returns 404 for private repos and ignores auth headers).
    private: true
