name: Build & Release Tauri

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            label: macos-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            label: macos-x64

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.label }})

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Build sidecar
        run: node src-tauri/sidecar/build.mjs

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build --target ${{ matrix.target }}

      - name: List bundle output
        shell: bash
        run: find src-tauri/target/${{ matrix.target }}/release/bundle -type f 2>/dev/null | sort || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: monomark-${{ matrix.label }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle
          if-no-files-found: ignore

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Read version from tauri.conf.json
        id: version
        run: echo "version=$(jq -r .version src-tauri/tauri.conf.json)" >> "$GITHUB_OUTPUT"

      - name: List all downloaded files
        run: find artifacts -type f | sort

      - name: Rename macOS artifacts to include arch
        run: |
          # macOS x64 and arm64 both produce Monomark.app.tar.gz — rename to avoid collisions
          for arch in macos-x64 macos-arm64; do
            dir="artifacts/monomark-${arch}/macos"
            if [ -d "$dir" ]; then
              suffix="${arch#macos-}"  # x64 or arm64
              for f in "$dir"/*.app.tar.gz; do
                [ -f "$f" ] || continue
                base=$(basename "$f" .app.tar.gz)
                mv "$f" "$dir/${base}_${suffix}.app.tar.gz"
                [ -f "$f.sig" ] && mv "$f.sig" "$dir/${base}_${suffix}.app.tar.gz.sig"
              done
            fi
          done
          echo "After rename:"
          find artifacts -type f -name "*.tar.gz*" | sort

      - name: Generate latest.json and create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ github.ref_name }}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          DOWNLOAD_BASE="https://github.com/${{ github.repository }}/releases/download/${TAG}"

          # Find updater artifacts and their signatures
          WIN_ZIP=$(find artifacts/monomark-windows-x64 -name "*.nsis.zip" ! -name "*.sig" 2>/dev/null | head -1)
          WIN_SIG=$(find artifacts/monomark-windows-x64 -name "*.nsis.zip.sig" 2>/dev/null | head -1)
          MAC_X64_TAR=$(find artifacts/monomark-macos-x64 -name "*.app.tar.gz" ! -name "*.sig" 2>/dev/null | head -1)
          MAC_X64_SIG=$(find artifacts/monomark-macos-x64 -name "*.app.tar.gz.sig" 2>/dev/null | head -1)
          MAC_ARM_TAR=$(find artifacts/monomark-macos-arm64 -name "*.app.tar.gz" ! -name "*.sig" 2>/dev/null | head -1)
          MAC_ARM_SIG=$(find artifacts/monomark-macos-arm64 -name "*.app.tar.gz.sig" 2>/dev/null | head -1)

          read_sig() { if [ -f "$1" ]; then cat "$1"; else echo ""; fi; }

          WIN_SIG_CONTENT=$(read_sig "$WIN_SIG")
          MAC_X64_SIG_CONTENT=$(read_sig "$MAC_X64_SIG")
          MAC_ARM_SIG_CONTENT=$(read_sig "$MAC_ARM_SIG")

          PLATFORMS="{}"
          if [ -n "$WIN_ZIP" ] && [ -n "$WIN_SIG_CONTENT" ]; then
            PLATFORMS=$(echo "$PLATFORMS" | jq --arg sig "$WIN_SIG_CONTENT" --arg url "${DOWNLOAD_BASE}/$(basename "$WIN_ZIP")" \
              '. + {"windows-x86_64": {"signature": $sig, "url": $url}}')
          fi
          if [ -n "$MAC_X64_TAR" ] && [ -n "$MAC_X64_SIG_CONTENT" ]; then
            PLATFORMS=$(echo "$PLATFORMS" | jq --arg sig "$MAC_X64_SIG_CONTENT" --arg url "${DOWNLOAD_BASE}/$(basename "$MAC_X64_TAR")" \
              '. + {"darwin-x86_64": {"signature": $sig, "url": $url}}')
          fi
          if [ -n "$MAC_ARM_TAR" ] && [ -n "$MAC_ARM_SIG_CONTENT" ]; then
            PLATFORMS=$(echo "$PLATFORMS" | jq --arg sig "$MAC_ARM_SIG_CONTENT" --arg url "${DOWNLOAD_BASE}/$(basename "$MAC_ARM_TAR")" \
              '. + {"darwin-aarch64": {"signature": $sig, "url": $url}}')
          fi

          jq -n \
            --arg version "$VERSION" \
            --arg notes "See the assets below for download links." \
            --arg pub_date "$PUB_DATE" \
            --argjson platforms "$PLATFORMS" \
            '{version: $version, notes: $notes, pub_date: $pub_date, platforms: $platforms}' > latest.json

          echo "Generated latest.json:"
          cat latest.json

          # Collect release assets (unique filenames only)
          ASSETS=("latest.json")
          for f in $(find artifacts -type f \( \
            -name "*-setup.exe" -o -name "*.msi" -o -name "*.dmg" \
            -o -name "*.nsis.zip" -o -name "*.nsis.zip.sig" \
            -o -name "*.app.tar.gz" -o -name "*.app.tar.gz.sig" \
          \) | sort); do
            ASSETS+=("$f")
          done

          echo "Release assets:"
          printf '  %s\n' "${ASSETS[@]}"

          gh release create "$TAG" \
            --title "Monomark $TAG" \
            --notes "See the assets below for download links." \
            "${ASSETS[@]}"
