name: Build & Release Tauri

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x64
            ext: .nsis.zip
            sig_ext: .nsis.zip.sig
            bundle_dir: nsis
          - os: macos-latest
            target: aarch64-apple-darwin
            label: macos-arm64
            ext: .app.tar.gz
            sig_ext: .app.tar.gz.sig
            bundle_dir: macos
          - os: macos-latest
            target: x86_64-apple-darwin
            label: macos-x64
            ext: .app.tar.gz
            sig_ext: .app.tar.gz.sig
            bundle_dir: macos

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.label }})

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Build sidecar
        run: node src-tauri/sidecar/build.mjs

      - name: Build Tauri app
        run: npx tauri build --target ${{ matrix.target }}

      - name: List bundle output
        shell: bash
        run: find src-tauri/target/${{ matrix.target }}/release/bundle -type f \( -name "*.sig" -o -name "*.tar.gz" -o -name "*.nsis.zip" -o -name "*.msi" -o -name "*.exe" -o -name "*.dmg" \) 2>/dev/null || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: monomark-${{ matrix.label }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi.zip
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi.zip.sig
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*-setup.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.nsis.zip
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.nsis.zip.sig
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz.sig
          if-no-files-found: ignore

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Read version from tauri.conf.json
        id: version
        run: echo "version=$(jq -r .version src-tauri/tauri.conf.json)" >> "$GITHUB_OUTPUT"

      - name: List all artifacts
        run: find artifacts -type f | sort

      - name: Generate latest.json
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ github.ref_name }}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Read signatures
          WIN_SIG=""
          MAC_X64_SIG=""
          MAC_ARM64_SIG=""

          if [ -f artifacts/monomark-windows-x64/*.nsis.zip.sig ]; then
            WIN_SIG=$(cat artifacts/monomark-windows-x64/*.nsis.zip.sig)
          fi
          if [ -f artifacts/monomark-macos-x64/*.app.tar.gz.sig ]; then
            MAC_X64_SIG=$(cat artifacts/monomark-macos-x64/*.app.tar.gz.sig)
          fi
          if [ -f artifacts/monomark-macos-arm64/*.app.tar.gz.sig ]; then
            MAC_ARM64_SIG=$(cat artifacts/monomark-macos-arm64/*.app.tar.gz.sig)
          fi

          DOWNLOAD_BASE="https://github.com/${{ github.repository }}/releases/download/${TAG}"

          # Find actual filenames
          WIN_NSIS=$(basename artifacts/monomark-windows-x64/*.nsis.zip 2>/dev/null || echo "")
          MAC_X64_TAR=$(basename artifacts/monomark-macos-x64/*.app.tar.gz 2>/dev/null || echo "")
          MAC_ARM64_TAR=$(basename artifacts/monomark-macos-arm64/*.app.tar.gz 2>/dev/null || echo "")

          cat > latest.json << ENDJSON
          {
            "version": "${VERSION}",
            "notes": "See the assets below for download links.",
            "pub_date": "${PUB_DATE}",
            "platforms": {
              "windows-x86_64": {
                "signature": "${WIN_SIG}",
                "url": "${DOWNLOAD_BASE}/${WIN_NSIS}"
              },
              "darwin-x86_64": {
                "signature": "${MAC_X64_SIG}",
                "url": "${DOWNLOAD_BASE}/${MAC_X64_TAR}"
              },
              "darwin-aarch64": {
                "signature": "${MAC_ARM64_SIG}",
                "url": "${DOWNLOAD_BASE}/${MAC_ARM64_TAR}"
              }
            }
          }
          ENDJSON

          echo "Generated latest.json:"
          cat latest.json

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"

          # Collect all release assets
          ASSETS=()
          for f in artifacts/monomark-windows-x64/*.exe artifacts/monomark-windows-x64/*.msi artifacts/monomark-windows-x64/*.nsis.zip artifacts/monomark-windows-x64/*.nsis.zip.sig \
                   artifacts/monomark-macos-x64/*.dmg artifacts/monomark-macos-x64/*.app.tar.gz artifacts/monomark-macos-x64/*.app.tar.gz.sig \
                   artifacts/monomark-macos-arm64/*.dmg artifacts/monomark-macos-arm64/*.app.tar.gz artifacts/monomark-macos-arm64/*.app.tar.gz.sig; do
            if [ -f "$f" ]; then
              ASSETS+=("$f")
            fi
          done
          ASSETS+=("latest.json")

          gh release create "$TAG" \
            --title "Monomark $TAG" \
            --notes "See the assets below for download links." \
            "${ASSETS[@]}"
